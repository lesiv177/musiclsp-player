<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MusicLSP Player</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  background: linear-gradient(180deg, #0f0f23 0%, #1a1a3e 50%, #16213e 100%);
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  color: #fff;
  overflow-x: hidden;
}
.container { max-width: 480px; margin: 0 auto; padding: 20px; }

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  padding-top: env(safe-area-inset-top, 0);
}
.header h1 { font-size: 20px; font-weight: 700; }
.header .playlist-name { font-size: 12px; color: rgba(255,255,255,0.5); }
.close-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.1); border: none; color: #fff;
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}

/* Cover */
.cover-wrap {
  position: relative;
  width: 280px; height: 280px;
  margin: 0 auto 28px;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
}
.cover-img {
  width: 100%; height: 100%;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 80px;
  transition: transform 0.3s ease;
}
.cover-img.playing { animation: pulse 2s ease-in-out infinite; }
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.02); }
}

/* Wave animation overlay */
.wave-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 80px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 3px;
  padding: 0 20px 16px;
  background: linear-gradient(to top, rgba(0,0,0,0.4), transparent);
}
.wave-bar {
  width: 4px;
  background: rgba(255,255,255,0.7);
  border-radius: 2px;
  transition: height 0.15s ease;
}
.wave-bar.active {
  animation: wave 0.8s ease-in-out infinite;
}
@keyframes wave {
  0%, 100% { transform: scaleY(0.3); opacity: 0.4; }
  50% { transform: scaleY(1); opacity: 1; }
}

/* Track info */
.track-info { text-align: center; margin-bottom: 24px; }
.track-title {
  font-size: 22px; font-weight: 700;
  margin-bottom: 8px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  padding: 0 10px;
}
.track-artist {
  font-size: 15px; color: rgba(255,255,255,0.55);
}

/* Progress */
.progress-section { margin-bottom: 28px; }
.progress-bar-wrap {
  width: 100%; height: 4px;
  background: rgba(255,255,255,0.12);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #667eea, #764ba2);
  border-radius: 2px;
  width: 0%;
  transition: width 0.1s linear;
  position: relative;
}
.progress-fill::after {
  content: '';
  position: absolute;
  right: -6px; top: 50%; transform: translateY(-50%);
  width: 12px; height: 12px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 2px 8px rgba(102,126,234,0.5);
  opacity: 0;
  transition: opacity 0.2s;
}
.progress-bar-wrap:hover .progress-fill::after { opacity: 1; }
.time-row {
  display: flex; justify-content: space-between;
  margin-top: 8px;
  font-size: 12px; color: rgba(255,255,255,0.35);
}

/* Controls */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-bottom: 32px;
}
.ctrl-btn {
  background: none; border: none; color: rgba(255,255,255,0.7);
  font-size: 24px; cursor: pointer;
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  transition: all 0.2s;
}
.ctrl-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }
.ctrl-btn:active { transform: scale(0.92); }
.ctrl-btn.play {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  font-size: 28px;
  box-shadow: 0 8px 24px rgba(102,126,234,0.4);
}
.ctrl-btn.play:hover {
  transform: scale(1.05);
  box-shadow: 0 12px 32px rgba(102,126,234,0.5);
}
.ctrl-btn.shuffle.active,
.ctrl-btn.repeat.active {
  color: #667eea;
  background: rgba(102,126,234,0.15);
}

/* Playlist */
.playlist-section {
  background: rgba(255,255,255,0.03);
  border-radius: 16px;
  padding: 16px;
  border: 1px solid rgba(255,255,255,0.05);
}
.playlist-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
  font-size: 13px; color: rgba(255,255,255,0.5);
}
.playlist-scroll {
  max-height: 240px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}
.playlist-scroll::-webkit-scrollbar { width: 4px; }
.playlist-scroll::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.15); border-radius: 2px;
}
.pl-track {
  display: flex; align-items: center;
  gap: 12px;
  padding: 10px 8px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.pl-track:hover { background: rgba(255,255,255,0.04); }
.pl-track.active {
  background: rgba(102,126,234,0.12);
  border: 1px solid rgba(102,126,234,0.2);
}
.pl-num {
  width: 28px; text-align: center;
  font-size: 12px; color: rgba(255,255,255,0.3);
}
.pl-track.active .pl-num { color: #667eea; }
.pl-info { flex: 1; min-width: 0; }
.pl-name {
  font-size: 14px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.pl-artist {
  font-size: 12px; color: rgba(255,255,255,0.4);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.pl-dur { font-size: 12px; color: rgba(255,255,255,0.3); }
.pl-wave {
  display: flex; align-items: flex-end; gap: 2px;
  height: 16px; width: 20px;
}
.pl-wave span {
  width: 3px; background: #667eea;
  border-radius: 1px;
  animation: plWave 0.6s ease-in-out infinite;
}
.pl-wave span:nth-child(2) { animation-delay: 0.1s; }
.pl-wave span:nth-child(3) { animation-delay: 0.2s; }
@keyframes plWave {
  0%, 100% { height: 4px; }
  50% { height: 14px; }
}

/* Loading */
.loading {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 100vh; gap: 16px;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: #667eea;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { color: rgba(255,255,255,0.5); font-size: 14px; }

/* Error */
.error-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 100vh; gap: 16px;
  padding: 20px; text-align: center;
}
.error-screen h2 { font-size: 18px; color: #ff6b6b; }
.error-screen p { color: rgba(255,255,255,0.5); font-size: 14px; }

/* Volume slider */
.volume-wrap {
  display: flex; align-items: center; gap: 10px;
  margin-top: 16px; padding: 0 8px;
}
.volume-wrap input[type="range"] {
  flex: 1;
  -webkit-appearance: none; appearance: none;
  height: 4px; background: rgba(255,255,255,0.12);
  border-radius: 2px; outline: none;
}
.volume-wrap input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 14px; height: 14px; background: #fff;
  border-radius: 50%; cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
</style>
</head>
<body>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <p>Завантаження плейлиста...</p>
</div>

<div id="app" class="container" style="display:none;">
  <div class="header">
    <div>
      <h1>MusicLSP</h1>
      <div class="playlist-name" id="playlistName">Плейлист</div>
    </div>
    <button class="close-btn" onclick="closeApp()">✕</button>
  </div>

  <div class="cover-wrap">
    <div class="cover-img" id="coverImg">🎵</div>
    <div class="wave-overlay" id="waveOverlay"></div>
  </div>

  <div class="track-info">
    <div class="track-title" id="trackTitle">—</div>
    <div class="track-artist" id="trackArtist">—</div>
  </div>

  <div class="progress-section">
    <div class="progress-bar-wrap" id="progressBar" onclick="seek(event)">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="time-row">
      <span id="currentTime">0:00</span>
      <span id="totalTime">0:00</span>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn shuffle" id="shuffleBtn" onclick="toggleShuffle()">🔀</button>
    <button class="ctrl-btn" onclick="prevTrack()">⏮</button>
    <button class="ctrl-btn" onclick="seekBack()">⏪</button>
    <button class="ctrl-btn play" id="playBtn" onclick="togglePlay()">▶</button>
    <button class="ctrl-btn" onclick="seekForward()">⏩</button>
    <button class="ctrl-btn" onclick="nextTrack()">⏭</button>
    <button class="ctrl-btn repeat" id="repeatBtn" onclick="toggleRepeat()">🔁</button>
  </div>

  <div class="volume-wrap">
    <span>🔊</span>
    <input type="range" min="0" max="100" value="80" id="volumeSlider" oninput="setVolume(this.value)">
  </div>

  <div class="playlist-section">
    <div class="playlist-header">
      <span>📋 Черга</span>
      <span id="trackCount">0 треків</span>
    </div>
    <div class="playlist-scroll" id="playlist"></div>
  </div>
</div>

<div id="error" class="error-screen" style="display:none;">
  <h2>😕 Щось пішло не так</h2>
  <p id="errorText">Не вдалося завантажити плейлист</p>
</div>

<script>
// ====== CONFIG ======
// Заміни на свій URL бота
// ⚠️ ЗАМІНИ НА СВІЙ URL БОТА (Render, Railway, VPS, тощо)
const BOT_API_URL = "https://your-bot-domain.com";

let tracks = [];
let currentIndex = 0;
let isPlaying = false;
let isShuffle = false;
let isRepeat = false;
let audio = null;
let progressInterval = null;

// ====== Telegram WebApp ======
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor("#0f0f23");
  tg.setBackgroundColor("#0f0f23");
}

function closeApp() {
  if (tg) tg.close();
  else window.close();
}

// ====== INIT ======
async function init() {
  const params = new URLSearchParams(window.location.search);
  const playlistId = params.get("playlist");
  const userId = params.get("user");

  if (!playlistId || !userId) {
    showError("Не вказано плейлист або користувача");
    return;
  }

  try {
    // Завантажуємо треки з API бота
    const resp = await fetch(`${BOT_API_URL}/api/playlist/${playlistId}?user=${userId}`);
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const data = await resp.json();

    if (!data.tracks || data.tracks.length === 0) {
      showError("Плейлист порожній");
      return;
    }

    tracks = data.tracks;
    document.getElementById("playlistName").textContent = data.name || "Плейлист";
    document.getElementById("trackCount").textContent = tracks.length + " треків";

    renderPlaylist();
    createWaveBars();
    loadTrack(0);

    document.getElementById("loading").style.display = "none";
    document.getElementById("app").style.display = "block";
  } catch (e) {
    console.error(e);
    showError("Не вдалося підключитися до сервера");
  }
}

function showError(text) {
  document.getElementById("loading").style.display = "none";
  document.getElementById("errorText").textContent = text;
  document.getElementById("error").style.display = "flex";
}

// ====== AUDIO ======
function loadTrack(index) {
  if (audio) {
    audio.pause();
    audio.removeEventListener("ended", onEnded);
    audio.removeEventListener("timeupdate", onTimeUpdate);
    audio.removeEventListener("loadedmetadata", onLoaded);
  }

  currentIndex = index;
  const track = tracks[index];

  document.getElementById("trackTitle").textContent = track.title || "—";
  document.getElementById("trackArtist").textContent = track.artist || "—";
  document.getElementById("coverImg").textContent = track.cover || "🎵";

  // Якщо є пряме MP3-посилання — рідний плеєр
  if (track.audio_url) {
    audio = new Audio(track.audio_url);
    hideEmbedPlayer();
  } else {
    // Немає прямого посилання — використовуємо embed
    audio = new Audio();
    showEmbedPlayer(track);
  }

  audio.volume = document.getElementById("volumeSlider").value / 100;
  audio.addEventListener("ended", onEnded);
  audio.addEventListener("timeupdate", onTimeUpdate);
  audio.addEventListener("loadedmetadata", onLoaded);
  audio.addEventListener("error", () => {
    console.warn("Audio error for track", index);
    // Авто-наступний при помилці
    setTimeout(nextTrack, 1000);
  });

  updatePlaylistUI();
  updatePlayButton();
}

function togglePlay() {
  if (!audio) return;

  // Якщо активний embed — нехай користувач керує через нього
  const embedContainer = document.getElementById("embedContainer");
  const hasEmbed = embedContainer && embedContainer.innerHTML.trim() !== "";

  if (hasEmbed) {
    // Для embed просто анімуємо кнопку — реальне керування через iframe
    isPlaying = !isPlaying;
    updatePlayButton();
    return;
  }

  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    stopWaveAnimation();
  } else {
    audio.play().catch(e => console.error(e));
    isPlaying = true;
    startWaveAnimation();
  }
  updatePlayButton();
}

function updatePlayButton() {
  document.getElementById("playBtn").textContent = isPlaying ? "⏸" : "▶";
  document.getElementById("coverImg").classList.toggle("playing", isPlaying);
}

function nextTrack() {
  let next;
  if (isShuffle) {
    next = Math.floor(Math.random() * tracks.length);
  } else {
    next = currentIndex + 1;
    if (next >= tracks.length) next = 0;
  }
  loadTrack(next);
  // Авто-відтворення для embed або audio
  if (!isPlaying) {
    setTimeout(() => { isPlaying = true; updatePlayButton(); startWaveAnimation(); }, 300);
  }
}

function prevTrack() {
  let prev = currentIndex - 1;
  if (prev < 0) prev = tracks.length - 1;
  loadTrack(prev);
  if (!isPlaying) {
    setTimeout(() => { isPlaying = true; updatePlayButton(); startWaveAnimation(); }, 300);
  }
}

function seekForward() {
  if (audio) audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10);
}
function seekBack() {
  if (audio) audio.currentTime = Math.max(0, audio.currentTime - 10);
}

function onEnded() {
  if (isRepeat) {
    audio.currentTime = 0;
    audio.play();
  } else {
    nextTrack();
  }
}

function onTimeUpdate() {
  if (!audio || !audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("currentTime").textContent = formatTime(audio.currentTime);
}

function onLoaded() {
  document.getElementById("totalTime").textContent = formatTime(audio.duration || 0);
}

function seek(event) {
  if (!audio || !audio.duration) return;
  const bar = document.getElementById("progressBar");
  const rect = bar.getBoundingClientRect();
  const pct = (event.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
}

function setVolume(val) {
  if (audio) audio.volume = val / 100;
}

function toggleShuffle() {
  isShuffle = !isShuffle;
  document.getElementById("shuffleBtn").classList.toggle("active", isShuffle);
}

function toggleRepeat() {
  isRepeat = !isRepeat;
  document.getElementById("repeatBtn").classList.toggle("active", isRepeat);
}

// ====== WAVE ANIMATION ======
function createWaveBars() {
  const container = document.getElementById("waveOverlay");
  container.innerHTML = "";
  for (let i = 0; i < 12; i++) {
    const bar = document.createElement("div");
    bar.className = "wave-bar";
    bar.style.height = (8 + Math.random() * 24) + "px";
    container.appendChild(bar);
  }
}

function startWaveAnimation() {
  document.querySelectorAll(".wave-bar").forEach((bar, i) => {
    bar.style.animationDelay = (i * 0.08) + "s";
    bar.classList.add("active");
  });
}

function stopWaveAnimation() {
  document.querySelectorAll(".wave-bar").forEach(bar => {
    bar.classList.remove("active");
  });
}

// ====== PLAYLIST UI ======
function renderPlaylist() {
  const container = document.getElementById("playlist");
  container.innerHTML = "";
  tracks.forEach((track, i) => {
    const div = document.createElement("div");
    div.className = "pl-track" + (i === currentIndex ? " active" : "");
    div.onclick = () => { loadTrack(i); if (!isPlaying) togglePlay(); };

    const num = document.createElement("div");
    num.className = "pl-num";
    num.innerHTML = i === currentIndex && isPlaying
      ? '<div class="pl-wave"><span></span><span></span><span></span></div>'
      : (i + 1);

    const info = document.createElement("div");
    info.className = "pl-info";
    info.innerHTML = `<div class="pl-name">${escapeHtml(track.title || "—")}</div>
                      <div class="pl-artist">${escapeHtml(track.artist || "—")}</div>`;

    const dur = document.createElement("div");
    dur.className = "pl-dur";
    dur.textContent = track.duration || "—";

    div.appendChild(num);
    div.appendChild(info);
    div.appendChild(dur);
    container.appendChild(div);
  });
}

function updatePlaylistUI() {
  document.querySelectorAll(".pl-track").forEach((el, i) => {
    el.classList.toggle("active", i === currentIndex);
    const num = el.querySelector(".pl-num");
    if (i === currentIndex && isPlaying) {
      num.innerHTML = '<div class="pl-wave"><span></span><span></span><span></span></div>';
    } else {
      num.textContent = i + 1;
    }
  });
  // Scroll to active
  const active = document.querySelector(".pl-track.active");
  if (active) active.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

// ====== EMBED FALLBACK ======
function showEmbedPlayer(track) {
  const container = document.getElementById("app");
  let embedHtml = "";

  if (track.url && track.url.includes("soundcloud.com")) {
    // SoundCloud embed
    const scUrl = encodeURIComponent(track.url);
    embedHtml = `
      <div style="margin-top:20px;border-radius:12px;overflow:hidden;background:rgba(255,255,255,0.05);">
        <iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay"
          src="https://w.soundcloud.com/player/?url=${scUrl}&color=%23667eea&auto_play=true&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false">
        </iframe>
      </div>
      <p style="font-size:11px;color:rgba(255,255,255,0.3);text-align:center;margin-top:8px;">
        🔊 SoundCloud embed
      </p>
    `;
  } else if (track.url && track.url.includes("deezer.com")) {
    // Deezer embed — беремо track ID з URL
    const dzMatch = track.url.match(/track\/(\d+)/);
    const dzId = dzMatch ? dzMatch[1] : "";
    if (dzId) {
      embedHtml = `
        <div style="margin-top:20px;border-radius:12px;overflow:hidden;background:rgba(255,255,255,0.05);">
          <iframe width="100%" height="166" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
            src="https://widget.deezer.com/widget/dark/track/${dzId}?autoplay=true">
          </iframe>
        </div>
        <p style="font-size:11px;color:rgba(255,255,255,0.3);text-align:center;margin-top:8px;">
          🔊 Deezer embed
        </p>
      `;
    }
  }

  if (!embedHtml) {
    // Універсальний fallback
    embedHtml = `
      <div style="margin-top:20px;padding:16px;background:rgba(255,255,255,0.05);border-radius:12px;text-align:center;">
        <p style="font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:12px;">
          ℹ️ Попередній перегляд обмежений — відкрий оригінал
        </p>
        <a href="${track.url}" target="_blank" 
           style="display:inline-block;padding:10px 20px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;text-decoration:none;border-radius:8px;font-size:14px;">
          🎵 Відкрити трек
        </a>
      </div>
    `;
  }

  // Додаємо embed ПІД контролами, замінюючи старий embed якщо є
  let embedDiv = document.getElementById("embedContainer");
  if (!embedDiv) {
    embedDiv = document.createElement("div");
    embedDiv.id = "embedContainer";
    const controls = document.querySelector(".controls");
    if (controls) controls.after(embedDiv);
    else container.appendChild(embedDiv);
  }
  embedDiv.innerHTML = embedHtml;
}

function hideEmbedPlayer() {
  const embedDiv = document.getElementById("embedContainer");
  if (embedDiv) embedDiv.innerHTML = "";
}

// ====== UTILS ======
function formatTime(sec) {
  if (!sec || isNaN(sec)) return "0:00";
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m + ":" + (s < 10 ? "0" : "") + s;
}

function escapeHtml(text) {
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

// ====== START ======
init();
</script>
</body>
</html>
